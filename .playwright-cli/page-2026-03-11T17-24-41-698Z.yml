      - img "GitHub Navigation Shortcuts" [ref=e17]
      - generic [ref=e18]:
        - heading "Context" [level=2] [ref=e19]
        - paragraph [ref=e20]: As a GitHub user, you may check a list of Issues or Pull Requests that are relevant to your work multiple times a day. There are various methods of quickly navigating to your lists on the web (browser bookmarks, quick links, command palettes, etc.) but on GitHub Mobile, finding your work often meant many taps of navigation and then setting a number of filters on the list you were viewing.
      - generic [ref=e21]:
        - heading "Problem" [level=2] [ref=e22]
        - paragraph [ref=e23]:
          - text: Checking in on your work on GitHub Mobile simply took too many repetitive taps.
          - text: There were very powerful filtering controls that could help you narrow in on the specific content you were looking for, but every time you wanted to switch between lists of your work, you had to manually adjust all the relevant filters.
          - text: When it took eight taps to set the filters you needed to view one group, and then six taps to switch to the other set of filters you check every day, it was clear there was room for improvement to truly enable fast, powerful workflows.
      - img "Issue filters with touch overlays" [ref=e28]
      - generic [ref=e29]:
        - heading "Solution" [level=2] [ref=e30]
        - paragraph [ref=e31]: I collaborated with engineers, designers, and product managers on the Mobile team to design a new primitive for GitHub Mobile, the “Shortcut.” This enables you to save your most frequently visited lists of issues, pull requests, and discussions right to your home tab dashboard.
      - img "Shortcuts on the GitHub Mobile home tab" [ref=e34]
      - paragraph [ref=e36]: With the launch of Shortcuts, you can now...
      - list [ref=e37]:
        - listitem [ref=e38]: Save the list you are currently looking at for one tap access in the future
        - listitem [ref=e39]: Build a Navigation Shortcut from scratch
        - listitem [ref=e40]: Personalize your Shortcuts for faster recognition
      - generic [ref=e41]:
        - img "Creating a Shortcut" [ref=e43]
        - paragraph [ref=e45]: When you tap to clear your filters, you are presented with the option to save them as a Shortcut for easy future navigation. Alternatively, you can create a Shortcut from scratch.
      - paragraph [ref=e47]: At the core, creating a Shortcut is analogous to bookmarking a browser tab. Shortcuts map directly to GitHub URLs.
      - generic [ref=e51]:
        - heading "Details" [level=2] [ref=e52]
        - paragraph [ref=e53]: Shortcut icons use a translucent fill and accent glyph to contrast with the standard content navigation item icons
      - generic [ref=e54]:
        - img "Anatomy of a Shortcut" [ref=e56]
        - paragraph [ref=e58]: Anatomy of a Shortcut
      - img "Shortcuts icon styling" [ref=e61]
      - paragraph [ref=e63]: The new user experience is designed to introduce the feature in the context it will be accessed and then to quickly educate you by offering a combination of smart default Shortcuts and Shortcuts based on your previously visited lists.
      - generic [ref=e64]:
        - img "New user experience for Shortcuts" [ref=e66]
        - paragraph [ref=e68]: Shortcuts' new user experience
      - generic [ref=e69]:
        - img "New user experience for Shortcuts" [ref=e71]
        - paragraph [ref=e73]: Suggested Shortcuts
      - paragraph [ref=e75]:
        - text: These recently visited Shortcut suggestions also help you gracefully recover if you forgot to save a list you recently visited.
        - text: You can experience Navigation Shortcuts yourself by downloading GitHub Mobile on the App Store or Google Play.
