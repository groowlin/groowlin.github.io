      - generic [ref=e18]:
        - heading "Context" [level=2] [ref=e19]
        - paragraph [ref=e20]: Copilot, GitHub’s LLM powered developer tool, had seen a lot of success helping developers write code via code completion in their IDE. This led to the question, “what if Copilot had the context of the work you do on github.com and could augment the software development experience from start to finish?”
      - generic [ref=e21]:
        - heading "Opportunity" [level=2] [ref=e22]
        - paragraph [ref=e23]: GitHub prioritized API endpoints to more deeply integrate Copilot into the platform and the Mobile team had the opportunity to leverage these endpoints and implement a mobile-first chat experience.
      - generic [ref=e24]:
        - heading "Initial problem" [level=2] [ref=e25]
        - paragraph [ref=e26]: The high level problem the team initially focused on was, “how can we effectively communicate that Copilot understands the context of what you are currently viewing?“ To tackle this question, I started exploring ways to shape the user's mental model of Copilot's capabilities.
      - generic [ref=e27]:
        - heading "Crafting the mental model through interaction design" [level=2] [ref=e28]
        - paragraph [ref=e29]:
          - text: Copilot is a second set of eyes, seeing exactly what you’re seeing, ready to jump in and help with whatever you’re looking at. It provides unique value by having an understanding of your work in GitHub and your current context.
          - text: To create this mental model, I designed an interaction pattern and transition that implies Copilot exists as a layer on top of the UI.
      - img "Copilot layer" [ref=e33]
      - paragraph [ref=e35]:
        - text: By using a pinch gesture, the user can “zoom out” from their current context to the higher level plane where Copilot exists, and “zoom back in” to their work on GitHub when they’ve finished interacting with Copilot.
        - text: Scale, blur, and opacity transitions are applied to this interruptible gesture to communicate how planes of the UI are moving in and out of focus.
      - paragraph [ref=e41]: Early interaction prototype
      - paragraph [ref=e43]: As an alternative, accessible route to access Copilot, I also added a floating action button entry point that opens Copilot in the context of the current view. Below, you can see Copilot explaining the specific details of a TypeScript file after being prompted to "explain this code."
      - generic [ref=e47]:
        - heading "Additional details" [level=2] [ref=e48]
        - paragraph [ref=e49]: I wrote Swift to create high fidelity prototypes, and took on the role of directly responsible individual to execute on the details and work to ensure this brand new app surface was built with a high level of craftsmanship.
      - generic [ref=e50]:
