      - heading "Background" [level=3] [ref=e26]
      - paragraph [ref=e27]:
        - text: The Magic Team (website + brand) at Linear had been exploring various visual styles for graphic assets on the homepage and were drawn to a skewed perspective style incorporating depth and glass-like materials.
        - link "Edgar" [ref=e28] [cursor=pointer]:
          - /url: https://x.com/ambedgar
        - text: worked some magic in Figma for many of the small assets you see on the page, but the team was also interested in exploring some 3D interface representations using physically based materials and lighting, similar to a render of the Linear app icon I previously created.
      - generic [ref=e30]:
        - generic [ref=e31]:
          - img
        - img "The Linear logo stylized in 3D glass" [ref=e33]
      - heading "Process" [level=3] [ref=e34]
      - paragraph [ref=e35]:
        - text: When it comes to the visual aspects of design, the framework I believe in is applying taste and collaboration to extensive iteration. For me, this often manifests as a cyclical process of analyzing my work, figuring out what parts could be improved, tweaking a value slightly, and comparing the new version to the old.
        - text: To get started, I created a scene to experiment with materials and lighting. Here is the first render I produced, with annotations of what was working and what wasn't, both from my analysis and feedback. This early iteration was more about the overall feel than anything scientific.
      - generic [ref=e37]:
        - img "Annotations on the first render" [ref=e39]
        - button [ref=e40] [cursor=pointer]:
          - img [ref=e42]
        - img "An early roadmap render of some basic shapes, but poor lighting and a blue tint" [ref=e46]
      - paragraph [ref=e47]:
        - text: Creating this first test render was primarily about giving myself and the team the confidence that the "let's render some assets in 3D" idea could actually amount to something. After gaining confidence in the idea and hearing some promising initial impressions, I wanted to focus on honing in on a style that could act as a foundation.
        - text: Going back to the framework I outlined earlier—apply taste and collaboration to iteration—this point in my experiments more or less marked one full cycle. The mindset you need however for the framework to be successful, is a willingness to just keep iterating, being critical, and making adjustments to improve your work. The above render was a start, but it didn't quite fit in with Edgar's existing graphics and wasn't up to my personal standards.
      - generic [ref=e48]:
        - generic [ref=e49]:
          - generic [ref=e50]:
            - img
          - img "Edgar's graphics on the homepage" [ref=e52]
        - paragraph [ref=e54]: "Credit: Edgar Ambartsoumian"
      - paragraph [ref=e55]:
        - text: To streamline my cycles and be able to quickly understand how adjustments I made affected the render, I created a scene with fewer moving pieces, similar to setting up a minimal reproducible example when debugging code.
        - text: My goal with the 50ms scene was to experiment with elements like the light reflections off the background surface, the roughness of the glass texture, and the atmospheric lighting (and also to collaborate with
        - link "Maya" [ref=e56] [cursor=pointer]:
          - /url: https://x.com/maya_ndljk
        - text: on bringing elements into a live canvas via Three.js. Maybe something you'll see from Linear in the future?).
