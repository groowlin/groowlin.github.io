      - paragraph [ref=e150]:
        - text: It's details like these that might not directly negatively impact landing page metrics, but they do collectively add to the impression of the quality of a product and the care that goes into creating it. Even if only 0.1% notice these imperfections, I—and I'm guessing the rest of the Linear team would agree—can't sleep well knowing they're there.
        - text: I eventually wound up reworking a lot of the meshes to make them sharper and more true to our product's interface and doing the depth-of-field blurring in Photoshop to have finer control over the focus of the image.
      - generic [ref=e152]:
        - generic [ref=e153]:
          - img
        - img "The roadmap render being shown in Photoshop with an iris blur being applied in post." [ref=e155]
      - paragraph [ref=e156]: Flattening the meshes out a bit proved to be the real key to give the renders more of a subtle feel that worked better in the context of the page. It brought them more in line stylistically with the other spot illustrations and I felt they better represented our product.
