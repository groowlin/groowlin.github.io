        - img "A second iteration of the roadmap render, using a more grayscale palette and refining lighting details" [ref=e98]
      - generic [ref=e100]:
        - img "Annotations on the issues render" [ref=e102]
        - button [ref=e103] [cursor=pointer]:
          - img [ref=e105]
        - img "An initial issue board render with annotations." [ref=e109]
      - paragraph [ref=e110]:
        - text: Again, a lot of my iterations here were "guess and check" where I'd make mental annotations like the ones you see above, start tweaking values, and comparing the output to the previous version.
        - text: For example, the third issue in the board view above was looking much too dark to my eye. It
        - emphasis [ref=e111]: should
        - text: be darker given it's lower to the surface and not as primary, but I learned that adjusting the lightness value of the glass material I was using for it was creating something closer to black glass, rather than a more translucent look.
        - text: Instead, by lowering the alpha (transparency) of the material, I could fade the issue into the background more, and decrease the shadow it cast. Then it was just a matter of trying a bunch of different alpha values and seeing which one I liked the best.
      - heading "A quick note on tools" [level=3] [ref=e115]
      - paragraph [ref=e116]: The tools I use are simply a means to an end. If you're a Blender / 3D expert, you might be thinking "adjusting the alpha of a shader isn't physically accurate" or "using an IOR of 1.17 for glass is incorrect." Or even "this could be a lot simpler in After Effects." When my goal is to create an image artifact that can be used on our website, I was happy to make physically inaccurate adjustments or turn to a tool that I knew how to use effectively to get the job done.
      - heading "More cycles" [level=3] [ref=e117]
      - paragraph [ref=e118]: "I won't go into the technical details of every adjustment I made, but my process looked very similar across the whole scene:"
      - list [ref=e119]:
        - listitem [ref=e120]: The outline style for the secondary issues was looking a bit off and distracting so I iterated through a few different ways of rendering them and ended up on a very subtle filled version.
        - listitem [ref=e121]: The glass elements took a lot of adjusting to get the right mix of brightness and translucency.
        - listitem [ref=e122]:
          - link "Julius" [ref=e123] [cursor=pointer]:
            - /url: https://x.com/tarngerine
          - text: pointed out that the avatars were a bit distracting and looked out of place given their lack of depth and translucency.
        - listitem [ref=e124]: The brightness of the secondary icons went through a lot of adjusting. I made a bunch of different versions of the typically orange "urgent" priority icon seen in the background to find the right level of attention grabbing.
        - listitem [ref=e125]: There was some pretty significant gradient banding caused by the subtle light glow on the background that I wanted to reduce as much as I could. Through my adjustment iterations I found I could cut almost all of the banding out by introducing 2% monochrome, gaussian noise at 50% gray, set to overlay.
        - listitem [ref=e126]:
          - link "Karri" [ref=e127] [cursor=pointer]:
            - /url: https://x.com/karrisaarinen
          - text: noted that the important parts of the render, notably the "Improve keyboard shortcuts" title and "AUG 22" date were not fully in focus and created too much light bloom so I spent a lot of time tweaking the camera aperture (and eventually removed depth of field entirely) and adjusting the glare that was being added in post compositing.
