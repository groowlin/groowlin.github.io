      - paragraph [ref=e67]: "We ended up not using this scene in the final homepage, but I learned how to capture elements of the aesthetic we were after:"
      - list [ref=e68]:
        - listitem [ref=e69]:
          - link "Volumetric lighting" [ref=e70] [cursor=pointer]:
            - /url: https://en.wikipedia.org/wiki/Volumetric_lighting
          - text: (think, visible hazy rays of light), more explicitly used here, created a really nice atmosphere that fit in with a lot of the aesthetic of the rest of the landing page.
      - list [ref=e74]:
        - listitem [ref=e75]:
          - text: Rough glass with an
          - link "index of refraction" [ref=e76] [cursor=pointer]:
            - /url: https://en.wikipedia.org/wiki/Refractive_index
          - text: that was not actually physically realistic was working nicely as a way to highlight the edges and give them more contrast against the background by changing the angle that light bends as it enters the glass.
      - list [ref=e80]:
        - listitem [ref=e81]: The background reflections significantly depended on the content it was reflecting. They worked nicely in the 50ms scene, but in the Roadmap scene with smaller details, looked much too busy. Below you can see an example where the reflections draw too much attention and make text very hard to read.
      - generic [ref=e83]:
        - generic [ref=e84]:
          - img
        - img "The roadmap render with too many reflections in the background" [ref=e86]
      - paragraph [ref=e87]: With these new notes on what was working and what wasn't, I started reworking the shaders on the Roadmap scene, and started explorations on a new Issues scene annotated below.
      - generic [ref=e89]:
        - img "Annotations on the roadmap render" [ref=e91]
        - button [ref=e92] [cursor=pointer]:
